spring:
  application:
    name: backend-core

  kafka:
    bootstrap-servers: ${KAFKA_SERVER_URL}
    consumer:
      bootstrap-servers: ${KAFKA_SERVER_URL}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: backend-core
      auto-offset-reset: latest
      properties:
        enable.auto.commit: false
        max.poll.records: 500
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.project.backend_core.kafka.event.HarassmentAlertEvent
        spring.json.trusted.packages: "*"
        fetch.min.bytes: 16384
        fetch.max.wait.ms: 400
    topic:
      harassment: ${KAFKA_TOPIC}

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/harassment}
    username: postgres
    password: ${DATASOURCE_PASSWORD:admin1234}

  minio:
    url: ${MINIO_URL}

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:admin1234}
      username: ${SPRING_REDIS_USERNAME:}
      ssl:
        enabled: ${SPRING_REDIS_SSL_ENABLED:false}
        bundle: ${SPRING_REDIS_SSL_BUNDLE:}
  cache:
    type: redis

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: postgresql

server:
  port: 8000


application:
  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:5173,http://100.100.224.121:5173}
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000
      refresh-token:
        expiration: 604800000

